<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peticiones - DJ Kokoi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Bloquea el scroll de la página principal */
            background-color: #1a1a1a; /* El color de fondo del formulario original */
        }

        /* El contenedor actúa como una "ventana" fija */
        .window {
            position: relative;
            width: 100%;
            height: 380px; /* Ajustamos la altura para que solo se vea el form */
            margin-top: 20px;
            overflow: hidden; /* Esto es vital: corta lo que sobresalga */
        }

        iframe {
            position: absolute;
            width: 100%;
            height: 600px; /* Le damos más altura interna pero el contenedor la cortará */
            border: none;
            /* Subimos el iframe para ocultar el h1 y el h3 si quieres, 
               o lo dejamos en 0 para que se vea "Send a request to kokoi" */
            top: -20px; 
            left: 0;
        }

        /* Tapadera inferior por si acaso el scroll falla en móviles */
        .cover-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px; /* Tapa el logo y los textos de abajo */
            background-color: #1a1a1a;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="window">
        <iframe 
            src="https://ask.the.dj/kokoi" 
            scrolling="no">
        </iframe>
    </div>
    
    <div class="cover-bottom"></div>

</body>
</html>
