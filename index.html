<!DOCTYPE html>
<html>
<head>
    <title>Envíame tu canción</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .wrapper {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: calc(60% + 100px); /* Ajusta para compensar el recorte */
            border: none;
            position: absolute;
            top: -60px; /* Esto oculta la cabecera con el logo de VDJ */
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://ask.the.dj/kokoi"></iframe>
    </div>
</body>
</html>
